<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Артём Смирнов | Разработка сайтов на заказ</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=JetBrains+Mono:wght@400;600&family=Space+Mono:wght@400;700&family=Inconsolata:wght@400;600&family=Share+Tech+Mono:wght@400;700&family=Source+Code+Pro:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap");
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 10%, rgba(46, 156, 255, 0.15), transparent 35%),
                linear-gradient(180deg, #030a12 0%, #03050a 60%, #02070f 100%);
            color: #e5e5e5;
            min-height: 100vh;
        }

        .container {
            min-height: 100vh;
            width: 100%;
            padding: 2.5rem 1.25rem 3rem;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(280px, 1fr) minmax(520px, 1.25fr);
            gap: 1.5rem;
        }

        .info-panel,
        .content-panel {
            background: linear-gradient(180deg, rgba(3, 6, 12, 0.8), rgba(5, 11, 20, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 26px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 520px;
        }

        .info-panel > div:first-child {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 24px;
            object-fit: cover;
            border: 2px solid rgba(46, 156, 255, 0.7);
            background: #111;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .info-panel h1 {
            font-size: 2rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 1.1rem;
            color: #7ed2ff;
            font-weight: 600;
        }

        .description {
            font-size: 0.95rem;
            color: #d1d8df;
            line-height: 1.5;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .nav-link {
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: #cdd6e0;
            text-align: left;
            padding: 0.6rem 1rem;
            border-radius: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .nav-link:hover {
            background: rgba(46, 156, 255, 0.15);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(46, 156, 255, 0.25);
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(46, 156, 255, 0.6);
        }

        .social-links {
            display: flex;
            gap: 1.1rem;
            font-size: 1.25rem;
        }

        .social-links a {
            color: #aaa;
            transition: color 0.2s;
        }

        .social-links a:hover {
            color: #7ed2ff;
        }

        .sidebar-email {
            font-size: 0.9rem;
            color: #a3adb6;
        }

        .info-cta {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 0.9rem;
            color: #cfd8e4;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tabs-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 0.5rem;
            border-radius: 18px;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            justify-content: space-between;
            overflow: hidden;
            align-items: center;
            min-height: 90px;
        }

        .tab-pill {
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 0.95rem 1.4rem;
            background: rgba(255, 255, 255, 0.03);
            color: #d9dde2;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            white-space: normal;
            transition: background 0.2s, border 0.2s, color 0.2s;
            flex: 1;
            text-align: center;
            min-width: 120px;
            min-height: 62px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }
        .tab-pill span {
            display: block;
            line-height: 1.1;
        }
        .tab-pill-primary {
            font-weight: 600;
        }
        .tab-pill-secondary {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: none;
        }
        .tab-onepage {
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
        }
        .tab-onepage .tab-pill-secondary {
            font-size: 0.7rem;
        }
        .tab-visitka {
            font-weight: 600;
            color: #fbe8c4;
            font-family: 'JetBrains Mono', 'Source Code Pro', monospace;
        }
        .tab-visitka .tab-pill-secondary {
            color: rgba(251, 232, 196, 0.7);
        }
        .tab-shop {
            font-size: 0.86rem;
            color: #cde1ff;
            text-shadow: 0 0 6px rgba(205, 225, 255, 0.6);
            font-family: 'Space Mono', 'IBM Plex Mono', monospace;
        }
        .tab-shop .tab-pill-secondary {
            color: rgba(205, 225, 255, 0.7);
        }
        .tab-corporate {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'Inconsolata', 'Share Tech Mono', monospace;
        }
        .tab-blog .tab-pill-primary {
            font-size: 0.92rem;
            letter-spacing: 0.06em;
            font-family: 'Share Tech Mono', 'Source Code Pro', monospace;
        }
        .tab-blog .tab-pill-secondary {
            font-style: italic;
        }
        .tab-portal .tab-pill-primary {
            font-size: 0.9rem;
            color: #d5fffe;
            font-family: 'Source Code Pro', 'Fira Code', monospace;
        }
        .tab-portal .tab-pill-secondary {
            color: rgba(213, 255, 254, 0.75);
            letter-spacing: 0.08em;
        }
        .tab-promo {
            font-size: 0.88rem;
            font-weight: 600;
            color: #ffd7f4;
            font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace;
        }

        .tab-pill.is-active {
            background: linear-gradient(135deg, #2e9cff, #7ed2ff);
            color: #02050a;
            border-color: transparent;
            box-shadow: 0 10px 20px rgba(46, 156, 255, 0.35);
        }

        .panel-view {
            margin-top: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
        }

        .panel-block {
            background: rgba(3, 7, 11, 0.9);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.25);
            width: 100%;
            box-sizing: border-box;
        }

        .panel-label {
            font-size: 0.85rem;
            color: #7ed2ff;
            margin-bottom: 0.35rem;
        }

        .panel-title {
            font-size: 1.9rem;
            margin-bottom: 0.75rem;
        }

        .panel-description {
            font-size: 0.95rem;
            color: #cfd9e2;
            line-height: 1.5;
        }

        .panel-tags {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .panel-tags span {
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            color: #e5e5e5;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(5, 9, 18, 0.9);
            padding: 1.25rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: #05090f;
            color: #f7f7f7;
            font-size: 0.9rem;
        }

        .contact-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            border: none;
            background: linear-gradient(135deg, #2e9cff, #5ac5ff);
            color: #03060c;
            padding: 0.85rem 1.5rem;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(46, 156, 255, 0.4);
        }

        .ghost-btn {
            background: transparent;
            color: #b8c4d2;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .panel-footer {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.85rem;
            color: #b2bac5;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .tabs-row {
                position: relative;
                top: 0;
            }
        }

        @media (max-width: 640px) {
            .info-panel,
            .content-panel {
                padding: 1.5rem;
            }

            .tabs-row {
                padding: 0.25rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
        <div class="tabs-row">
            <button type="button" class="tab-pill tab-onepage" data-tab="onepage">
                <span class="tab-pill-primary">Одностраничный сайт</span>
            </button>
            <button type="button" class="tab-pill tab-visitka" data-tab="visitka">
                <span class="tab-pill-primary">Сайт-визитка</span>
            </button>
            <button type="button" class="tab-pill tab-shop" data-tab="shop">
                <span class="tab-pill-primary">Интернет-магазин</span>
            </button>
            <button type="button" class="tab-pill tab-corporate" data-tab="corporate">
                <span class="tab-pill-primary">Корпоративный сайт</span>
            </button>
            <button type="button" class="tab-pill tab-blog" data-tab="blog">
                <span class="tab-pill-primary">Блог</span>
                <span class="tab-pill-secondary">персональный сайт</span>
            </button>
            <button type="button" class="tab-pill tab-portal" data-tab="portal">
                <span class="tab-pill-primary">Портал</span>
                <span class="tab-pill-secondary">информационный сайт</span>
            </button>
            <button type="button" class="tab-pill tab-promo" data-tab="promo">
                <span class="tab-pill-primary">Промо-сайт</span>
            </button>
        </div>
    <main class="main-content">
        <div class="info-panel">
            <div>
                <img class="profile-img" src="https://randomuser.me/api/portraits/men/32.jpg" alt="Артём Смирнов">
                <h1>Артём Смирнов</h1>
                <div class="tagline">Frontend-разработчик</div>
                <p class="description">Создаю современные сайты и веб-приложения с акцентом на UX, скорость и детали интерфейса.</p>
            </div>
            <div class="nav-links">
                <button type="button" class="nav-link" data-tab="onepage">Проекты</button>
                <button type="button" class="nav-link" data-tab="corporate">Опыт и навыки</button>
                <button type="button" class="nav-link" data-tab="contact">Контакты</button>
            </div>
            <div class="social-links">
                <a href="#" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" target="_blank" aria-label="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="#" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <div class="sidebar-email"><i class="far fa-envelope"></i> artem@smirnov.dev</div>
            <div class="info-cta">
                <p>Готов подключиться к вашему проекту и предложить прозрачные сроки, бюджет и технические решения.</p>
                <button type="button" class="btn ghost-btn">Скачать резюме</button>
            </div>
        </div>
        <div class="content-panel">
            <div class="panel-view" id="panel-view"></div>
        </div>
    </main>
</div>
<script>
const tabData = {
    onepage: {
        label: 'Landing & коммерческие страницы',
        title: 'Одностраничный сайт',
        description: 'Продающий лендинг с акцентом на продукт, быстро загружается и плавно рассказывает историю с CTA.',
        highlights: ['Лёгкая анимация', 'Форма заявки + отправка на почту', 'Оптимизация под Core Web Vitals'],
        footer: 'Пример: «Зелёный дом — лендинг» с интеграцией формы заказа и адаптивным дизайном.'
    },
    visitka: {
        label: 'Мини-сайты для личности',
        title: 'Сайт-визитка',
        description: 'Минималистичный профиль с биографией, краткими кейсами, ссылками на соцсети и быстрой связью.',
        highlights: ['Карта достижений', 'Кнопки соцсетей', 'Лёгкий контактный блок'],
        footer: 'Идеально подходит для фрилансеров, коучей и фотографов.'
    },
    shop: {
        label: 'Коммерция & каталоги',
        title: 'Интернет-магазин',
        description: 'Каталог с фильтрами, карточками и пояснением преимуществ; интеграция оплаты и логистики.',
        highlights: ['Каталог + фильтры', 'Интеграция с платежными системами', 'Автоматические письма клиенту'],
        footer: 'Использую headless CMS и Stripe/PayPal для быстрой публикации.'
    },
    corporate: {
        label: 'Брендовые порталы',
        title: 'Корпоративный сайт',
        description: 'Многостраничный проект для агентства или команды с блоками кейсов, услуг и командой.',
        highlights: ['Лидогенерация через формы', 'Интеграция CRM', 'Блог и новости компании'],
        footer: 'Образец: «Корпоративный сайт IT‑агентства» с админкой для клиента.'
    },
    blog: {
        label: 'Истории и публикации',
        title: 'Блог / персональный сайт',
        description: 'Структурированный блог, где легко публиковать статьи, вести рубрики и размещать подписку.',
        highlights: ['Архив статей', 'Подписка и новости', 'SEO-оптимизированный текст'],
        footer: 'Подходит для авторов, коучей и продуктовых команд.'
    },
    portal: {
        label: 'Информационные платформы',
        title: 'Портал / информационный сайт',
        description: 'Сборник материалов: новости, базы знаний, расписания; быстрый поиск и фильтры.',
        highlights: ['Категории и фильтры', 'Комбинация статей и данных', 'Админская часть'],
        footer: 'Часто создаю на базе Next.js + headless CMS / Airtable.'
    },
    promo: {
        label: 'Акции & кампании',
        title: 'Промо-сайт',
        description: 'Целенаправленный лендинг под кампанию, акция или запуск услуги с CTA и социальным proof.',
        highlights: ['УТП + выгоды', 'Яркая визуальная секция', 'Конверсионные блоки'],
        footer: 'Запускаю за 1‑2 недели с отчётами по результатам.'
    },
    contact: {
        label: 'Контакты и заявки',
        title: 'Свяжитесь со мной',
        description: 'Отвечаю в течение рабочего дня, обсуждаю требования и составляю прозрачные предложения.',
        highlights: ['Быстрый ответ', 'Точные оценки сроков и бюджета', 'Поддержка после релиза'],
        extra: `<div class="panel-block">
            <form id="demo-form" class="contact-form" action="#" method="post">
                <input type="text" name="name" placeholder="Ваше имя" required>
                <input type="email" name="email" placeholder="Email для ответа" required>
                <textarea name="details" rows="4" placeholder="Расскажите о проекте..."></textarea>
                <button type="submit" class="btn">Отправить →</button>
            </form>
        </div>`,
        footer: '<i class="fas fa-paper-plane"></i> artem@smirnov.dev / Telegram: @artem_dev'
    }
};

const panelView = document.getElementById('panel-view');
const tabButtons = document.querySelectorAll('.tab-pill');
const navLinks = document.querySelectorAll('.nav-link');

const renderPanel = (tabId) => {
    const data = tabData[tabId];
    if (!data) {
        return;
    }
    const tags = (data.highlights || [])
        .map(item => `<span>${item}</span>`)
        .join('');

    panelView.innerHTML = `
        <div class="panel-block">
            <p class="panel-label">${data.label}</p>
            <h3 class="panel-title">${data.title}</h3>
            <p class="panel-description">${data.description}</p>
            ${tags ? `<div class="panel-tags">${tags}</div>` : ''}
        </div>
        ${data.extra || ''}
        ${data.footer ? `<div class="panel-footer">${data.footer}</div>` : ''}
    `;
};

const attachFormHandler = () => {
    const form = document.getElementById('demo-form');
    if (form) {
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            alert('Демо-режим: форма не отправляется. В реальном проекте добавьте обработку на сервер.');
            form.reset();
        });
    }
};

const setActiveTab = (tabId) => {
    renderPanel(tabId);
    attachFormHandler();
    tabButtons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.tab === tabId));
    navLinks.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
};

tabButtons.forEach(btn => btn.addEventListener('click', () => setActiveTab(btn.dataset.tab)));
navLinks.forEach(btn => btn.addEventListener('click', () => setActiveTab(btn.dataset.tab)));

setActiveTab('onepage');
</script>
</body>
</html>
