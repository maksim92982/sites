        label: 'Контакты и заявки',
        title: 'Свяжитесь со мной',
        description: 'Отвечаю в течение рабочего дня, обсуждаю требования и составляю прозрачные предложения.',
        highlights: ['Быстрый ответ', 'Точные оценки сроков и бюджета', 'Поддержка после релиза'],
        extra: `<div class="panel-block">
            <form id="demo-form" class="contact-form" action="#" method="post">
                <input type="text" name="name" placeholder="Ваше имя" required>
                <input type="email" name="email" placeholder="Email для ответа" required>
                <textarea name="details" rows="4" placeholder="Расскажите о проекте..."></textarea>
                <button type="submit" class="btn">Отправить →</button>
            </form>
        </div>`,
        footer: '<i class="far fa-envelope"></i> ma89spb@gmail.com / <i class="fab fa-telegram"></i> @maksim_alex / <i class="fas fa-phone-alt"></i> +7 953 373-60-73'
    }
};

const panelView = document.getElementById('panel-view');
const tabButtons = document.querySelectorAll('.tab-pill');
const navLinks = document.querySelectorAll('.nav-link');

const renderPanel = (tabId) => {
    const data = tabData[tabId];
    if (!data) {
        return;
    }
    const tags = (data.highlights || [])
        .map(item => `<span>${item}</span>`)
        .join('');

    panelView.innerHTML = `
        <div class="panel-block">
            <p class="panel-label">${data.label}</p>
            <h3 class="panel-title">${data.title}</h3>
            <p class="panel-description">${data.description}</p>
            ${tags ? `<div class="panel-tags">${tags}</div>` : ''}
        </div>
        ${data.extra || ''}
        ${data.footer ? `<div class="panel-footer">${data.footer}</div>` : ''}
    `;
};

const attachFormHandler = () => {
    const form = document.getElementById('demo-form');
    if (form) {
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            alert('Демо-режим: форма не отправляется. В реальном проекте добавьте обработку на сервер.');
            form.reset();
        });
    }
};

const setActiveTab = (tabId) => {
    renderPanel(tabId);
    attachFormHandler();
    tabButtons.forEach(btn => btn.classList.toggle('is-active', btn.dataset.tab === tabId));
    navLinks.forEach(btn => btn.classList.remove('active'));
};

const setActiveByNav = (tabId) => {
    renderPanel(tabId);
    attachFormHandler();
    tabButtons.forEach(btn => btn.classList.remove('is-active'));
    navLinks.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
};

tabButtons.forEach(btn => btn.addEventListener('click', () => setActiveTab(btn.dataset.tab)));
navLinks.forEach(btn => btn.addEventListener('click', () => setActiveByNav(btn.dataset.tab)));

setActiveTab('onepage');
</script>
