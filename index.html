<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer T-shirt</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Raleway:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #dcd0ff;
        --deep: #1a1a1a;
        --muted: #555;
        --card-bg: rgba(255, 255, 255, 0.7);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Raleway", sans-serif;
        background: linear-gradient(180deg, #e2dcef 0%, #dcd0ff 55%, #ead2eb 100%);
        color: var(--deep);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 32px 16px;
      }

      .phone {
        width: min(420px, 90vw);
        background: linear-gradient(180deg, #f8f5fa, #dfd7ef 60%, #f3e8f4 100%);
        border-radius: 40px;
        padding: 24px;
        box-shadow: 0 30px 60px rgba(65, 14, 131, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.15);
        display: grid;
        place-items: center;
        background: #fff;
        cursor: pointer;
      }

      .icon svg {
        width: 20px;
        height: 20px;
        stroke: var(--deep);
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 3vw, 2.4rem);
        text-align: center;
        margin: 18px 0 8px;
        letter-spacing: 0.05em;
      }

      .rating {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 0.95rem;
        color: var(--muted);
        gap: 4px;
      }

      .rating svg {
        width: 16px;
        height: 16px;
        fill: #ffd60a;
      }

      .image-card {
        margin: 20px auto;
        width: 100%;
        border-radius: 28px;
        background: #fff;
        padding: 12px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      .image-card img {
        width: 100%;
        display: block;
        border-radius: 20px;
      }

      .image-card .favorite {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid rgba(0, 0, 0, 0.1);
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.8);
        cursor: pointer;
      }

      section {
        margin-top: 16px;
      }

      section h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        margin-bottom: 8px;
      }

      .option-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .size-chip,
      .color-chip {
        border-radius: 12px;
        padding: 12px 16px;
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.15);
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .size-chip.active {
        background: var(--deep);
        color: #fff;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6);
      }

      .color-chip {
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 50%;
        border-width: 0;
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
      }

      .color-chip.active {
        outline: 3px solid var(--deep);
      }

      .price-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 24px;
      }

      .price-row .price {
        font-size: clamp(2rem, 3vw, 2.4rem);
        font-family: "Playfair Display", serif;
      }

      .add-btn {
        border: none;
        background: var(--deep);
        color: #fff;
        padding: 14px 22px;
        border-radius: 24px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .add-btn::before {
        content: "+";
        font-size: 1.2rem;
      }

      @media (max-width: 480px) {
        .phone {
          padding: 20px;
        }

        .size-chip,
        .add-btn {
          flex: 1 1 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="top-row">
        <button class="icon" aria-label="Назад">
          <svg viewBox="0 0 24 24">
            <path
              d="M15 6l-6 6 6 6"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
            />
          </svg>
        </button>
        <button class="icon" aria-label="Добавить в избранное">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 21s-6-5.33-6-9.33C6 8.01 7.8 6 12 6s6 2.01 6 5.67C18 15.67 12 21 12 21Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
            />
          </svg>
        </button>
      </div>

      <h1>Summer T-shirt</h1>
      <div class="rating">
        <svg viewBox="0 0 24 24">
          <path d="M11.999 17.27 5.396 21l1.074-6.263L1.5 9.735l6.305-.916L12 3l2.195 5.819 6.305.916-4.97 4.999L18.603 21z" />
        </svg>
        <span>4.9 rating (198 reviews)</span>
      </div>

      <div class="image-card">
        <img src="/Users/janart/.cursor/projects/Users-janart-Desktop-front-site/assets/______________2026-03-22___18.54.10-50828223-6437-4fd5-92dd-ea0e625dd8f6.png" alt="Summer t-shirt model" />
        <button class="favorite" aria-label="Сохранить">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 21s-6-5.33-6-9.33C6 8.01 7.8 6 12 6s6 2.01 6 5.67C18 15.67 12 21 12 21Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
            />
          </svg>
        </button>
      </div>

      <section aria-label="Выбор размера">
        <h2>Select Size</h2>
        <div class="option-grid" id="sizes">
          <button class="size-chip" data-size="XS">XS</button>
          <button class="size-chip" data-size="S">S</button>
          <button class="size-chip active" data-size="M">M</button>
          <button class="size-chip" data-size="L">L</button>
          <button class="size-chip" data-size="XL">XL</button>
          <button class="size-chip" data-size="XXL">XXL</button>
        </div>
      </section>

      <section aria-label="Выбор цвета">
        <h2>Select Colour</h2>
        <div class="option-grid" id="colors">
          <button class="color-chip" data-color="forest" style="background: #11400f;"></button>
          <button class="color-chip active" data-color="white" style="background: #f4f1ef;"></button>
          <button class="color-chip" data-color="black" style="background: #0f0f0f;"></button>
          <button class="color-chip" data-color="beige" style="background: #d5c7c7;"></button>
        </div>
      </section>

      <div class="price-row">
        <div class="price">$88.90</div>
        <button class="add-btn">Add</button>
      </div>
    </div>

    <script>
      document.querySelectorAll(".size-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          document.querySelectorAll(".size-chip").forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
        });
      });

      document.querySelectorAll(".color-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          document.querySelectorAll(".color-chip").forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
        });
      });
    </script>
  </body>
</html>
